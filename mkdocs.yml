site_name: PtyLabX Documentation
site_description: JAX-based ptychographic reconstruction toolbox

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - CPM Workflow:
    - Overview: cpm/overview.md
    - Data Format: cpm/data-format.md
    - Engines: cpm/engines.md
    - Configuration Reference: cpm/configuration.md
  - Tutorials:
    - CPM Example: tutorials/01_tutorial_CPM.ipynb
    - FPM Example: tutorials/02_tutorial_FPM.ipynb
    - CPM Synthetic: tutorials/03_tutorial_CPM_sim.ipynb
    - CPM Multi-Wavelength : tutorials/04_tutorial_CPM_multiWavelength.ipynb
    - CPM Position Correction: tutorials/05_tutorial_CPM_LateralPositionCorrection.ipynb
    - CPM Reflection: tutorials/06_tutorial_CPM_Reflection.ipynb
    - CPM Reflection with Intensity Constraint: tutorials/07_tutorial_CPM_Reflection_IntensityConstraint.ipynb

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocs-jupyter:
      include: ["*.ipynb"]
      execute: false
      allow_errors: true
