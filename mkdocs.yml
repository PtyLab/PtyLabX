site_name: PtyLabX Documentation
site_description: JAX-based ptychographic reconstruction toolbox

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - CPM Workflow:
    - Overview: cpm/overview.md
    - Data Format: cpm/data-format.md
    - Engines: cpm/engines.md
    - Configuration Reference: cpm/configuration.md
  - Tutorials:
    - Simulation & Reconstruction: tutorials/demo.ipynb
    - CPM Introduction: tutorials/jupyter_tutorials_tutorial_CPM.ipynb
    - CPM Simulation: tutorials/jupyter_tutorials_tutorial_CPM_sim.ipynb
    - Multi-Wavelength CPM: tutorials/jupyter_tutorials_tutorial_CPM_multiWavelength.ipynb
    - Position Correction: tutorials/jupyter_tutorials_tutorial_LateralPositionCorrection.ipynb

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocs-jupyter:
      include: ["*.ipynb"]
      execute: false
      allow_errors: true
